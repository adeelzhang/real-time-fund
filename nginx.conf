map $http_accept $guji_wants_markdown {
    default 0;
    ~*text/markdown 1;
}

server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header Link '</llms.txt>; rel="describedby"; type="text/markdown", </sitemap.xml>; rel="sitemap"; type="application/xml"' always;
    add_header Vary "Accept" always;

    location = / {
        if ($guji_wants_markdown) {
            rewrite ^ /index.md last;
        }

        try_files /index.html =404;
    }

    location = /index.md {
        default_type text/markdown;
        try_files $uri =404;
    }

    # Service Worker 必须每次更新检查时可重新验证，不能按静态 JS 长期缓存。
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        expires -1;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ~ ^(.+)/$ {
        return 308 $1$is_args$args;
    }

    location / {
        try_files $uri.html $uri $uri/index.html =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
